<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Eagle Guessing Game</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); /* Cool blauer Hintergrund */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }

        /* Das Bild-Styling */
        .eagle-img {
            width: 100%;
            height: 150px;
            object-fit: cover; /* Schneidet das Bild passend zu */
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: #1e3c72; }
        
        input {
            width: 60px;
            padding: 10px;
            font-size: 1.2rem;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        button {
            background-color: #f39c12; /* Gold/Orange wie ein Adler-Schnabel */
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background-color: #e67e22; }

        #meldung { font-size: 1.1rem; margin-top: 15px; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Hier ist das Adler-Bild von Unsplash (kostenlose Bilder) -->
        <img src="https://unsplash.com" alt="Adler" class="eagle-img">
        
        <h1>Eagle Eyes</h1>
        <p>Kannst du die Zahl (1-10) sehen?</p>
        
        <input type="number" id="nutzerTipp" min="1" max="10">
        <br>
        <button onclick="pruefeZahl()">Check!</button>

        <p id="meldung"></p>
    </div>

    <script>
        let geheimZahl = Math.floor(Math.random() * 10) + 1;

        function pruefeZahl() {
            let tipp = document.getElementById("nutzerTipp").value;
            let anzeige = document.getElementById("meldung");

            if (tipp == geheimZahl) {
                anzeige.innerHTML = "🦅 <b>Scharfes Auge! Richtig!</b>";
                anzeige.style.color = "#27ae60";
                setTimeout(() => location.reload(), 3000);
            } else {
                anzeige.innerHTML = tipp > geheimZahl ? "Zu hoch! Flieg tiefer..." : "Zu niedrig! Steig höher...";
                anzeige.style.color = "#c0392b";
            }
        }
    </script>

</body>
</html>
